<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Proxy - 主页</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        :root[data-theme="dark"] {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #3a3a3a;
            --bg-hover: #404040;
            --text-primary: #e8e8e8;
            --text-secondary: #a0a0a0;
            --border-color: #404040;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --card-shadow: rgba(0, 0, 0, 0.3);
            --success-color: #22c55e;
            --danger-color: #ef4444;
        }

        :root[data-theme="light"] {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-tertiary: #ececf1;
            --bg-hover: #e5e5e5;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --border-color: #d9d9e3;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --card-shadow: rgba(0, 0, 0, 0.1);
            --success-color: #22c55e;
            --danger-color: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 48px;
            position: relative;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .header-logo {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-color), #3b82f6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .header-logo svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        .header h1 {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--text-primary), var(--text-secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .theme-toggle-btn {
            position: absolute;
            right: 0;
            width: 44px;
            height: 44px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle-btn:hover {
            background: var(--bg-hover);
        }

        /* Action Cards */
        .action-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .action-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 32px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 2px 8px var(--card-shadow);
        }

        .action-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--card-shadow);
            border-color: var(--accent-color);
        }

        .action-card-icon {
            width: 56px;
            height: 56px;
            background: var(--accent-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .action-card-icon svg {
            width: 28px;
            height: 28px;
            color: white;
        }

        .action-card h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .action-card p {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        /* MCP List Section */
        .mcp-list-section {
            margin-top: 48px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-header h2 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .refresh-btn {
            padding: 10px 20px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .refresh-btn:hover {
            background: var(--bg-hover);
        }

        .mcp-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .mcp-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.2s;
            position: relative;
        }

        .mcp-card:hover {
            border-color: var(--accent-color);
            box-shadow: 0 4px 12px var(--card-shadow);
        }

        .mcp-card-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .mcp-card-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .mcp-card-id {
            font-size: 11px;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
        }

        .mcp-card-description {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            min-height: 42px;
        }

        .mcp-card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            gap: 12px;
        }

        .mcp-card-footer-left {
            display: flex;
            gap: 12px;
            flex: 1;
        }

        .mcp-card-tools {
            position: relative;
        }

        .mcp-card-remote-url {
            position: relative;
        }

        .mcp-card-tools-btn,
        .mcp-card-remote-url-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .mcp-card-tools-btn:hover,
        .mcp-card-remote-url-btn:hover {
            background: var(--bg-hover);
            border-color: var(--accent-color);
        }

        .mcp-card-tools-dropdown,
        .mcp-card-remote-url-dropdown {
            display: none;
            position: absolute;
            bottom: 100%;
            left: 0;
            margin-bottom: 8px;
            padding-top: 8px;
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 8px 24px var(--card-shadow);
            min-width: 300px;
            max-width: 400px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 100;
            opacity: 0;
            transition: opacity 0.2s ease-in-out;
            pointer-events: none;
        }

        /* 在按钮和下拉框之间创建一个不可见的桥接区域 */
        .mcp-card-tools::before,
        .mcp-card-remote-url::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 0;
            right: 0;
            height: 16px;
            z-index: 99;
        }

        .mcp-card-tools:hover .mcp-card-tools-dropdown,
        .mcp-card-tools-dropdown:hover,
        .mcp-card-remote-url:hover .mcp-card-remote-url-dropdown,
        .mcp-card-remote-url-dropdown:hover {
            display: block;
            opacity: 1;
            pointer-events: auto;
            transition-delay: 0s;
        }

        .mcp-card-remote-url-dropdown {
            min-width: 350px;
            max-width: 500px;
            max-height: none;
        }

        .mcp-card-tools-dropdown::-webkit-scrollbar {
            width: 6px;
        }

        .mcp-card-tools-dropdown::-webkit-scrollbar-track {
            background: transparent;
        }

        .mcp-card-tools-dropdown::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        .remote-url-content {
            padding: 12px 16px;
        }

        .remote-url-text {
            font-size: 13px;
            color: var(--accent-color);
            font-family: 'Courier New', monospace;
            word-break: break-all;
            line-height: 1.6;
            background: var(--bg-secondary);
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
        }

        .remote-url-copy-btn {
            width: 100%;
            padding: 8px 12px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .remote-url-copy-btn:hover {
            background: var(--accent-hover);
        }

        .tool-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .tool-item:last-child {
            border-bottom: none;
        }

        .tool-item:hover {
            background: var(--bg-secondary);
        }

        .tool-item-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-family: 'Courier New', monospace;
        }

        .tool-item-description {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .mcp-card-transport {
            padding: 4px 10px;
            background: var(--bg-tertiary);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            color: var(--accent-color);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 18px;
            margin-bottom: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: var(--bg-primary);
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 20px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-label .required {
            color: var(--danger-color);
            margin-left: 4px;
        }

        .form-input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .form-select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-textarea {
            width: 100%;
            min-height: 200px;
            padding: 12px 14px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text-primary);
            resize: vertical;
            line-height: 1.6;
            transition: all 0.2s;
        }

        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .form-hint {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 6px;
        }

        .json-editor {
            width: 100%;
            min-height: 400px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 16px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: var(--text-primary);
            resize: vertical;
            line-height: 1.6;
        }

        .json-editor:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .modal-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-hover);
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-title">
                <div class="header-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="10" rx="2"></rect>
                        <circle cx="12" cy="5" r="2"></circle>
                        <path d="M12 7v4"></path>
                        <line x1="8" y1="16" x2="8" y2="16"></line>
                        <line x1="16" y1="16" x2="16" y2="16"></line>
                    </svg>
                </div>
                <h1>MCP Proxy</h1>
            </div>
            <button class="theme-toggle-btn" onclick="toggleTheme()" title="切换主题">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>

        <!-- Action Cards -->
        <div class="action-cards">
            <div class="action-card" onclick="window.location.href='chat.html'">
                <div class="action-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div>
                <h2>对话生成 MCP</h2>
                <p>通过智能对话的方式，逐步引导您创建和配置 MCP 服务</p>
            </div>

            <div class="action-card" onclick="openJsonModal()">
                <div class="action-card-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14M5 12h14"></path>
                    </svg>
                </div>
                <h2>一键生成 MCP</h2>
                <p>直接粘贴 OpenAPI JSON 配置，快速创建 MCP 服务</p>
            </div>
        </div>

        <!-- MCP List -->
        <div class="mcp-list-section">
            <div class="section-header">
                <h2>已创建的 MCP 服务</h2>
                <button class="refresh-btn" onclick="loadMcpList()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"></path>
                    </svg>
                    刷新
                </button>
            </div>
            <div id="mcpList" class="mcp-grid">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- JSON Modal -->
    <div id="jsonModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>一键生成 MCP</h3>
                <button class="modal-close" onclick="closeJsonModal()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div id="errorMessage" class="error-message" style="display: none;"></div>
                
                <div class="form-group">
                    <label class="form-label">
                        服务名称
                        <span class="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="mcpName" 
                        class="form-input" 
                        placeholder="例如: 用户管理服务"
                        required
                    />
                </div>

                <div class="form-group">
                    <label class="form-label">
                        服务描述
                    </label>
                    <input 
                        type="text" 
                        id="mcpDescription" 
                        class="form-input" 
                        placeholder="例如: 提供用户增删改查功能的 API 服务"
                    />
                </div>

                <div class="form-group">
                    <label class="form-label">
                        传输协议
                        <span class="required">*</span>
                    </label>
                    <select id="mcpTransport" class="form-select">
                        <option value="sse">SSE (Server-Sent Events)</option>
                        <option value="streamable_http">Streamable HTTP</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        OpenAPI Schema
                        <span class="required">*</span>
                    </label>
                    <textarea 
                        id="openapiSchema" 
                        class="form-textarea" 
                        placeholder='请输入 OpenAPI 3.1+ JSON 配置，例如：
{
  "openapi": "3.1.0",
  "info": {
    "title": "My API",
    "version": "1.0.0",
    "description": "API description"
  },
  "servers": [
    {
      "url": "https://api.example.com"
    }
  ],
  "paths": {
    "/users": {
      "get": {
        "summary": "Get users",
        "operationId": "getUsers",
        "responses": {
          "200": {
            "description": "Success"
          }
        }
      }
    }
  }
}'></textarea>
                    <div class="form-hint">必须是有效的 OpenAPI 3.1+ JSON 格式</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeJsonModal()">取消</button>
                <button class="btn btn-primary" onclick="submitJson()">创建 MCP</button>
            </div>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
